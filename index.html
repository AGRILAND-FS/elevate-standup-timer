<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Standup Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: 'Orbitron', sans-serif;
    background: #000;
    color: #fff;
    overflow: auto;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  body { display: flex; align-items: center; justify-content: center; text-align: center; }
  #app { width: 100%; min-height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 2rem; }

  /* Start screen */
  .start-screen h1 {
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 900;
    margin-bottom: 2rem;
    letter-spacing: 0.1em;
    text-shadow: 0 0 30px rgba(255,255,255,0.4);
    line-height: 1.05;
  }
  .start-screen p { font-size: 2rem; font-weight: 600; color: #bbb; margin-bottom: 2.5rem; letter-spacing: 0.15em; }
  .names-preview {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.95rem, 2vw, 1.6rem);
    color: #888;
    margin-bottom: 3.5rem;
    letter-spacing: 0.15em;
    line-height: 1.5;
  }

  button {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    padding: 1.5rem 3rem;
    border: 3px solid #fff;
    background: transparent;
    color: #fff;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: transform 0.1s, background 0.2s, box-shadow 0.2s;
    min-width: 14rem;
  }
  button:hover:not(:disabled) { background: #fff; color: #000; box-shadow: 0 0 30px rgba(255,255,255,0.6); }
  button:active:not(:disabled) { transform: scale(0.97); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  button.ghost { visibility: hidden; pointer-events: none; }

  .btn-row { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
  .btn-done { border-color: #4ade80; color: #4ade80; }
  .btn-done:hover:not(:disabled) { background: #4ade80; color: #000; box-shadow: 0 0 30px rgba(74,222,128,0.7); }
  .btn-over { border-color: #fbbf24; color: #fbbf24; }
  .btn-over:hover:not(:disabled) { background: #fbbf24; color: #000; box-shadow: 0 0 30px rgba(251,191,36,0.7); }
  .btn-pause { border-color: #60a5fa; color: #60a5fa; }
  .btn-pause:hover:not(:disabled) { background: #60a5fa; color: #000; box-shadow: 0 0 30px rgba(96,165,250,0.7); }
  .btn-back { border-color: #888; color: #888; }
  .btn-back:hover:not(:disabled) { background: #888; color: #000; box-shadow: 0 0 30px rgba(136,136,136,0.5); }

  .paused-banner {
    color: #60a5fa;
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: 0.3em;
    text-shadow: 0 0 20px rgba(96,165,250,0.7);
  }

  /* Splash screen */
  .splash-screen { width: 100%; max-width: 900px; }
  .splash-screen h1 {
    font-size: 4rem;
    font-weight: 900;
    margin-bottom: 1.5rem;
    letter-spacing: 0.1em;
    text-shadow: 0 0 30px rgba(255,255,255,0.4);
  }
  .splash-screen .subtitle {
    font-size: 1.75rem;
    font-weight: 600;
    color: #aaa;
    margin-bottom: 3rem;
    letter-spacing: 0.2em;
  }
  .team-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
    margin-bottom: 1.25rem;
  }
  .team-btn {
    width: 100%;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 2rem 1.5rem;
  }
  .team-btn .team-name {
    font-size: clamp(1.1rem, 3.5vw, 2rem);
    font-weight: 900;
    letter-spacing: 0.12em;
    color: var(--team-color, #fff);
    text-shadow: 0 0 20px var(--team-color, #fff);
    transition: color 0.2s, text-shadow 0.2s;
    overflow-wrap: break-word;
    word-break: break-word;
    line-height: 1.1;
  }
  .team-btn .team-members {
    font-family: 'Share Tech Mono', monospace;
    color: #888;
    font-size: clamp(0.7rem, 1.5vw, 0.95rem);
    letter-spacing: 0.15em;
    text-transform: none;
  }
  @media (max-width: 600px) {
    .team-grid { grid-template-columns: 1fr; }
  }
  .team-btn {
    border-color: var(--team-color, #fff);
  }
  .team-btn:hover {
    background: var(--team-color, #fff);
    color: #000;
    box-shadow: 0 0 30px var(--team-color, #fff);
  }
  .team-btn:hover .team-name { color: #000; text-shadow: none; }
  .team-btn:hover .team-members { color: #000; }
  .custom-btn { width: 100%; }

  /* Configure (custom) screen */
  .config-screen { width: 100%; max-width: 700px; }
  .config-screen h1 {
    font-size: 5rem;
    font-weight: 900;
    margin-bottom: 1rem;
    letter-spacing: 0.1em;
    text-shadow: 0 0 30px rgba(255,255,255,0.4);
  }
  .config-screen .subtitle {
    font-size: 1.5rem;
    font-weight: 600;
    color: #aaa;
    margin-bottom: 2rem;
    letter-spacing: 0.15em;
  }
  textarea#nameInput {
    width: 100%;
    min-height: 14rem;
    padding: 1.25rem 1.5rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.5rem;
    background: #111;
    color: #fff;
    border: 2px solid #444;
    border-radius: 4px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  textarea#nameInput:focus { border-color: #4ade80; box-shadow: 0 0 20px rgba(74,222,128,0.4); }
  .config-stats {
    margin: 1.5rem 0 2rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.5rem;
    color: #aaa;
    letter-spacing: 0.15em;
    min-height: 2rem;
  }
  .config-stats.error { color: #ef4444; }

  /* Flash screen */
  .flash-screen {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    animation: flash 0.5s ease-in-out infinite alternate;
  }
  @keyframes flash {
    from { opacity: 0.4; transform: scale(0.95); }
    to   { opacity: 1;   transform: scale(1.05); }
  }
  .flash-name {
    font-family: 'Orbitron', sans-serif;
    font-size: min(16rem, calc(120vw / var(--name-chars, 5)));
    font-weight: 900;
    letter-spacing: 0.05em;
    text-shadow: 0 0 80px currentColor, 0 0 30px currentColor;
    line-height: 1;
    text-align: center;
    padding: 0 1rem;
  }

  /* Timer screen */
  .timer-screen { display: flex; flex-direction: column; align-items: center; gap: 2rem; width: 100%; }
  .timer-name {
    font-size: min(7rem, calc(75vw / var(--name-chars, 5)));
    font-weight: 900;
    letter-spacing: 0.1em;
    text-shadow: 0 0 40px currentColor;
    line-height: 1;
    text-align: center;
  }
  .timer-clock {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16rem;
    font-weight: 400;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    line-height: 1;
    text-shadow: 0 0 40px rgba(255,255,255,0.3);
  }
  .timer-clock.overtime { color: #ef4444; text-shadow: 0 0 50px rgba(239,68,68,0.8); }
  .timer-meta { color: #aaa; font-size: 1.75rem; font-weight: 600; letter-spacing: 0.2em; }

  /* Leaderboard link on splash */
  .leaderboard-link {
    margin-top: 2.5rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    color: #888;
    letter-spacing: 0.2em;
    cursor: pointer;
    background: none;
    border: none;
    min-width: 0;
    padding: 0.5rem 1rem;
    text-transform: uppercase;
  }
  .leaderboard-link:hover { background: none; color: #fff; box-shadow: none; }

  /* Leaderboard screen */
  .leaderboard-screen { width: 100%; max-width: 900px; }
  .leaderboard-screen h1 {
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 900;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
    text-shadow: 0 0 30px rgba(255,255,255,0.4);
  }
  .leaderboard-screen .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.95rem;
    color: #888;
    letter-spacing: 0.15em;
    margin-bottom: 2rem;
    text-transform: none;
  }
  .leaderboard-list { list-style: none; margin-bottom: 2rem; }
  .leaderboard-row {
    display: grid;
    grid-template-columns: 3rem 1fr auto auto;
    gap: 1.5rem;
    align-items: center;
    padding: 1rem 1.5rem; margin-bottom: 0.75rem;
    border: 2px solid #333; border-radius: 4px;
    font-size: clamp(1.1rem, 2vw, 1.75rem);
    text-align: left;
  }
  .leaderboard-row .rank { font-weight: 900; text-align: center; font-family: 'Share Tech Mono', monospace; }
  .leaderboard-row .name { font-weight: 800; letter-spacing: 0.1em; }
  .leaderboard-row .runs {
    font-family: 'Share Tech Mono', monospace;
    color: #888;
    font-size: 0.85em;
    letter-spacing: 0.1em;
    text-transform: none;
  }
  .leaderboard-row .saved {
    font-family: 'Share Tech Mono', monospace;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
  }
  .leaderboard-row .saved.under { color: #4ade80; }
  .leaderboard-row .saved.over { color: #ef4444; }
  .leaderboard-row.top1 { border-color: #fbbf24; box-shadow: 0 0 30px rgba(251,191,36,0.4); }
  .leaderboard-row.top2 { border-color: #cbd5e1; }
  .leaderboard-row.top3 { border-color: #fb923c; }
  .empty-leaderboard {
    font-family: 'Share Tech Mono', monospace;
    color: #666;
    font-size: 1.25rem;
    letter-spacing: 0.15em;
    padding: 3rem 0;
  }

  /* Summary screen */
  .summary-screen { width: 100%; max-width: 900px; }
  .summary-screen h1 {
    font-size: 4rem;
    font-weight: 900;
    letter-spacing: 0.1em;
    margin-bottom: 2rem;
    text-shadow: 0 0 30px rgba(255,255,255,0.4);
  }
  .summary-list { list-style: none; margin-bottom: 2.5rem; }
  .summary-row {
    display: flex; justify-content: space-between; align-items: center; gap: 1.5rem;
    padding: 1.5rem 2rem; margin-bottom: 1rem;
    border: 2px solid #333; border-radius: 4px;
    font-size: 2.25rem;
  }
  .summary-row .name { font-weight: 800; letter-spacing: 0.1em; text-shadow: 0 0 20px currentColor; flex: 1; text-align: left; }
  .summary-row .name .rocket { margin-right: 0.75rem; filter: drop-shadow(0 0 10px #fbbf24); }
  .summary-row .time {
    font-family: 'Share Tech Mono', monospace;
    font-variant-numeric: tabular-nums;
    color: #aaa;
    letter-spacing: 0.05em;
    text-align: right;
  }
  .summary-row .time.over { color: #ef4444; }
  .summary-row .time.under { color: #4ade80; }
  .summary-row.winner {
    border-color: #fbbf24;
    box-shadow: 0 0 30px rgba(251,191,36,0.4);
  }
  .total-row { border-color: #fff; margin-top: 2rem; font-weight: 900; }
</style>
</head>
<body>
<div id="app"></div>

<script>
(() => {
  const TEAMS = {
    "ELEVATE":      { color: "#7FDBFF", blockFirst: "Brian",            members: ["Brian", "Mary", "Amber", "Lori", "Jeremy"] },
    "MARKETING":    { color: "#FF6B6B", blockFirst: "Tony",             members: ["Jill", "Ashley", "Adam", "Christine", "Tony"] },
    "ENERGY":       { color: "#FF7A1A", blockFirst: "Nicole",           members: ["Nicole", "Jessica", "Trina", "Heather", "Jeremy"] },
    "PROJECT MGMT": { color: "#DFFF00", blockFirst: "Mark Christensen", members: ["Jeremy Gray", "Mark Christensen", "Nate Katzer"] },
  };
  const CUSTOM_COLOR = "#C0C0C0";

  const COLOR_PALETTE = [
    "#ffb800", // gold
    "#38bdf8", // sky blue
    "#d946ef", // neon purple
    "#ff1493", // neon pink
    "#a3e635", // lime
    "#22d3ee", // cyan
    "#f97316", // orange
    "#facc15", // yellow
    "#fb7185", // rose
    "#a78bfa", // violet
  ];

  const PRESET_SECONDS = 5 * 60;
  const MAX_TOTAL_SECONDS = 30 * 60;
  const MAX_CUSTOM_PEOPLE = 10;
  const LEADERBOARD_KEY = "meeting-timer-leaderboard-v1";

  const app = document.getElementById("app");

  let state = {
    screen: "splash",
    team: null,            // team name string
    members: [],           // ordered (post-shuffle) names
    colors: {},            // name -> hex color (random per round)
    secondsPerPerson: PRESET_SECONDS,
    currentIndex: 0,
    remaining: 0,
    elapsed: 0,
    overtimeAdded: 0,
    paused: false,
    results: [],
    intervalId: null,
    flashTimeoutId: null,
    customDraft: "",       // remembered textarea content
  };

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Shuffle, but make sure `blockedName` doesn't end up first.
  function shuffleAvoidingFirst(arr, blockedName) {
    const s = shuffle(arr);
    if (s.length > 1 && s[0] === blockedName) {
      const swap = 1 + Math.floor(Math.random() * (s.length - 1));
      [s[0], s[swap]] = [s[swap], s[0]];
    }
    return s;
  }

  // Custom-group constraint: original first can't go first, original last can't go last.
  function shuffleCustomConstrained(arr, firstName, lastName) {
    if (arr.length < 2) return shuffle(arr);
    for (let i = 0; i < 200; i++) {
      const s = shuffle(arr);
      if (s[0] !== firstName && s[s.length - 1] !== lastName) return s;
    }
    // Fallback: avoid first at minimum.
    return shuffleAvoidingFirst(arr, firstName);
  }

  function alphabetized(arr) {
    return arr.slice().sort((a, b) => a.localeCompare(b));
  }

  // ---------- Leaderboard persistence (localStorage) ----------
  function loadLeaderboard() {
    try {
      const raw = localStorage.getItem(LEADERBOARD_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch { return {}; }
  }
  function persistLeaderboard(data) {
    try { localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(data)); } catch {}
  }
  function recordRun(team, results) {
    const data = loadLeaderboard();
    results.forEach(r => {
      const entry = data[r.name] || { saved: 0, elapsed: 0, allotted: 0, runs: 0, lastTeam: null, lastSeen: null };
      entry.saved += (r.allotted - r.elapsed);
      entry.elapsed += r.elapsed;
      entry.allotted += r.allotted;
      entry.runs += 1;
      entry.lastTeam = team;
      entry.lastSeen = new Date().toISOString();
      data[r.name] = entry;
    });
    persistLeaderboard(data);
  }
  function clearLeaderboard() {
    try { localStorage.removeItem(LEADERBOARD_KEY); } catch {}
  }

  function assignRandomColors(names) {
    const palette = shuffle(COLOR_PALETTE);
    const out = {};
    names.forEach((name, i) => { out[name] = palette[i % palette.length]; });
    return out;
  }

  // For custom groups: largest 30s-aligned slot per person such that total <= 30 min
  function customSecondsPerPerson(n) {
    if (n <= 0) return 0;
    return Math.floor(MAX_TOTAL_SECONDS / n / 30) * 30;
  }

  function formatTime(totalSeconds) {
    const sign = totalSeconds < 0 ? "-" : "";
    const s = Math.abs(totalSeconds);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${sign}${m}:${sec.toString().padStart(2, "0")}`;
  }

  function formatElapsed(seconds) {
    const sign = seconds < 0 ? "-" : "";
    const s = Math.abs(seconds);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${sign}${m}:${sec.toString().padStart(2, "0")}`;
  }

  function clearTimers() {
    if (state.intervalId) { clearInterval(state.intervalId); state.intervalId = null; }
    if (state.flashTimeoutId) { clearTimeout(state.flashTimeoutId); state.flashTimeoutId = null; }
  }

  function render() {
    clearTimers();
    app.innerHTML = "";
    if (state.screen === "splash") renderSplash();
    else if (state.screen === "configure") renderConfigure();
    else if (state.screen === "start") renderStart();
    else if (state.screen === "next") renderNext();
    else if (state.screen === "flash") renderFlash();
    else if (state.screen === "timer") renderTimer();
    else if (state.screen === "summary") renderSummary();
    else if (state.screen === "leaderboard") renderLeaderboard();
  }

  // ---------- Splash ----------
  function renderSplash() {
    const teamButtons = Object.entries(TEAMS).map(([name, info]) => `
      <button class="team-btn" data-team="${name}" style="--team-color:${info.color}">
        <span class="team-name">${name}</span>
        <span class="team-members">${info.members.length} people · 5:00 each</span>
      </button>
    `).join("");

    const el = document.createElement("div");
    el.className = "splash-screen";
    el.innerHTML = `
      <h1>Meeting Timer</h1>
      <p class="subtitle">Choose your team</p>
      <div class="team-grid">
        ${teamButtons}
      </div>
      <button class="team-btn custom-btn" data-team="__custom__" style="--team-color:${CUSTOM_COLOR}">
        <span class="team-name">+ Custom Group</span>
        <span class="team-members">Up to 10 people · scales to fit 30:00</span>
      </button>
      <button class="leaderboard-link" id="leaderboardLink">🏆 View Leaderboard</button>
    `;
    app.appendChild(el);

    el.querySelectorAll(".team-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const team = btn.dataset.team;
        if (team === "__custom__") {
          state.screen = "configure";
          render();
        } else {
          selectPresetTeam(team);
        }
      });
    });

    document.getElementById("leaderboardLink").addEventListener("click", () => {
      state.screen = "leaderboard";
      render();
    });
  }

  function teamColor() {
    return state.team && TEAMS[state.team] ? TEAMS[state.team].color : CUSTOM_COLOR;
  }

  function selectPresetTeam(teamName) {
    state.team = teamName;
    state.members = TEAMS[teamName].members.slice();
    state.secondsPerPerson = PRESET_SECONDS;
    state.screen = "start";
    render();
  }

  // ---------- Configure (custom) ----------
  function renderConfigure() {
    const el = document.createElement("div");
    el.className = "config-screen";
    el.innerHTML = `
      <h1>Custom</h1>
      <p class="subtitle">Up to ${MAX_CUSTOM_PEOPLE} people · scales to fit 30:00</p>
      <textarea id="nameInput" placeholder="One name per line..."></textarea>
      <div class="config-stats" id="configStats">&nbsp;</div>
      <div class="btn-row">
        <button class="btn-back" id="backBtn">Back</button>
        <button class="btn-done" id="continueBtn" disabled>Continue</button>
      </div>
    `;
    app.appendChild(el);

    const input = document.getElementById("nameInput");
    const stats = document.getElementById("configStats");
    const continueBtn = document.getElementById("continueBtn");
    const backBtn = document.getElementById("backBtn");

    input.value = state.customDraft || "";

    function parseNames() {
      return input.value
        .split(/[\r\n,]+/)
        .map(s => s.trim())
        .filter(Boolean);
    }

    function updateStats() {
      const names = parseNames();
      const n = names.length;
      state.customDraft = input.value;

      if (n === 0) {
        stats.textContent = "Enter at least 1 name";
        stats.classList.remove("error");
        continueBtn.disabled = true;
        return;
      }
      if (n > MAX_CUSTOM_PEOPLE) {
        stats.textContent = `Too many — max ${MAX_CUSTOM_PEOPLE}`;
        stats.classList.add("error");
        continueBtn.disabled = true;
        return;
      }
      const perPerson = customSecondsPerPerson(n);
      const total = perPerson * n;
      stats.textContent = `${n} ${n === 1 ? "person" : "people"} × ${formatTime(perPerson)} each = ${formatTime(total)} total`;
      stats.classList.remove("error");
      continueBtn.disabled = false;
    }

    input.addEventListener("input", updateStats);
    updateStats();
    setTimeout(() => input.focus(), 50);

    backBtn.addEventListener("click", () => {
      state.screen = "splash";
      render();
    });

    continueBtn.addEventListener("click", () => {
      const names = parseNames();
      if (names.length === 0 || names.length > MAX_CUSTOM_PEOPLE) return;
      state.team = "CUSTOM";
      state.members = names;
      state.secondsPerPerson = customSecondsPerPerson(names.length);
      state.screen = "start";
      render();
    });
  }

  // ---------- Start ----------
  function renderStart() {
    const totalMin = formatTime(state.secondsPerPerson * state.members.length);
    const c = teamColor();
    const el = document.createElement("div");
    el.className = "start-screen";
    el.innerHTML = `
      <h1 style="color:${c}; text-shadow: 0 0 30px ${c};">${state.team}</h1>
      <p>${formatTime(state.secondsPerPerson)} per person · ${totalMin} total</p>
      <div class="names-preview">${alphabetized(state.members).join(" · ")}</div>
      <div class="btn-row">
        <button class="btn-back" id="backBtn">Back</button>
        <button class="ghost">Pause</button>
        <button class="btn-done" id="startBtn">Start</button>
      </div>
    `;
    app.appendChild(el);

    document.getElementById("startBtn").addEventListener("click", startRound);
    document.getElementById("backBtn").addEventListener("click", () => {
      state.screen = "splash";
      render();
    });
  }

  function startRound() {
    let order;
    if (state.team === "CUSTOM") {
      const first = state.members[0];
      const last = state.members[state.members.length - 1];
      order = shuffleCustomConstrained(state.members, first, last);
    } else {
      const blocked = TEAMS[state.team]?.blockFirst;
      order = blocked ? shuffleAvoidingFirst(state.members, blocked) : shuffle(state.members);
    }
    state.members = order;
    state.colors = assignRandomColors(order);
    state.currentIndex = 0;
    state.results = [];
    beginPerson();
  }

  function beginPerson() {
    state.remaining = state.secondsPerPerson;
    state.elapsed = 0;
    state.overtimeAdded = 0;
    state.paused = false;
    state.screen = "flash";
    render();
    state.flashTimeoutId = setTimeout(() => {
      state.screen = "timer";
      render();
    }, 2500);
  }

  // ---------- Next ----------
  function renderNext() {
    const totalMin = formatTime(state.secondsPerPerson * state.members.length);
    const c = teamColor();
    const el = document.createElement("div");
    el.className = "start-screen";
    el.innerHTML = `
      <h1 style="color:${c}; text-shadow: 0 0 30px ${c};">${state.team}</h1>
      <p>${formatTime(state.secondsPerPerson)} per person · ${totalMin} total</p>
      <div class="names-preview">${alphabetized(state.members).join(" · ")}</div>
      <div class="btn-row">
        <button class="ghost">+1 Minute</button>
        <button class="ghost">Pause</button>
        <button class="btn-done" id="nextBtn">Next</button>
      </div>
    `;
    app.appendChild(el);
    document.getElementById("nextBtn").addEventListener("click", beginPerson);
  }

  // ---------- Flash ----------
  function renderFlash() {
    const name = state.members[state.currentIndex];
    const color = state.colors[name] || "#fff";
    const el = document.createElement("div");
    el.className = "flash-screen";
    el.innerHTML = `<div class="flash-name" style="--name-chars:${name.length}; color:${color}">${name}</div>`;
    app.appendChild(el);
  }

  // ---------- Timer ----------
  function renderTimer() {
    const name = state.members[state.currentIndex];
    const color = state.colors[name] || "#fff";
    const isOvertime = state.remaining < 0;

    const el = document.createElement("div");
    el.className = "timer-screen";
    el.innerHTML = `
      <div class="timer-name" style="--name-chars:${name.length}; color:${color}">${name}</div>
      <div class="timer-clock ${isOvertime ? "overtime" : ""}">${formatTime(state.remaining)}</div>
      <div class="timer-meta">Person ${state.currentIndex + 1} of ${state.members.length}${state.overtimeAdded ? ` · +${state.overtimeAdded}:00 overtime` : ""}</div>
      ${state.paused ? `<div class="paused-banner">● Paused for Discussion</div>` : ""}
      <div class="btn-row">
        <button class="btn-over" id="overBtn">+1 Minute</button>
        <button class="btn-pause" id="pauseBtn">${state.paused ? "Resume" : "Pause"}</button>
        <button class="btn-done" id="doneBtn">Done</button>
      </div>
    `;
    app.appendChild(el);

    document.getElementById("doneBtn").addEventListener("click", finishPerson);
    document.getElementById("overBtn").addEventListener("click", () => {
      state.remaining += 60;
      state.overtimeAdded += 1;
      render();
    });
    document.getElementById("pauseBtn").addEventListener("click", () => {
      state.paused = !state.paused;
      render();
    });

    if (!state.paused) {
      state.intervalId = setInterval(() => {
        state.remaining -= 1;
        state.elapsed += 1;
        const clockEl = app.querySelector(".timer-clock");
        const metaEl = app.querySelector(".timer-meta");
        if (clockEl) {
          clockEl.textContent = formatTime(state.remaining);
          if (state.remaining < 0) clockEl.classList.add("overtime");
        }
        if (metaEl) {
          metaEl.textContent = `Person ${state.currentIndex + 1} of ${state.members.length}${state.overtimeAdded ? ` · +${state.overtimeAdded}:00 overtime` : ""}`;
        }
      }, 1000);
    }
  }

  function finishPerson() {
    const name = state.members[state.currentIndex];
    state.results.push({
      name,
      color: state.colors[name] || "#fff",
      elapsed: state.elapsed,
      allotted: state.secondsPerPerson,
      overtimeAdded: state.overtimeAdded,
    });

    state.currentIndex += 1;
    if (state.currentIndex >= state.members.length) {
      recordRun(state.team, state.results);
      state.screen = "summary";
    } else {
      state.screen = "next";
    }
    render();
  }

  // ---------- Summary ----------
  function renderSummary() {
    const total = state.results.reduce((sum, r) => sum + r.elapsed, 0);
    const totalAllotted = state.results.reduce((sum, r) => sum + r.allotted, 0);
    const totalSaved = totalAllotted - total;

    // Rank by most time saved (allotted - elapsed), descending
    const ranked = state.results
      .map(r => ({ ...r, saved: r.allotted - r.elapsed }))
      .sort((a, b) => b.saved - a.saved);

    const winnerName = ranked[0]?.name;

    const rows = ranked.map(r => {
      const isWinner = r.name === winnerName;
      let cls = "";
      let label = "";
      if (r.saved > 0) { cls = "under"; label = ` (-${formatElapsed(r.saved)})`; }
      else if (r.saved < 0) { cls = "over"; label = ` (+${formatElapsed(-r.saved)})`; }
      const rocket = isWinner ? `<span class="rocket">🚀</span>` : "";
      return `
        <li class="summary-row${isWinner ? " winner" : ""}">
          <span class="name" style="color:${r.color}">${rocket}${r.name}</span>
          <span class="time ${cls}">${formatElapsed(r.elapsed)}${label}</span>
        </li>
      `;
    }).join("");

    const totalCls = totalSaved > 0 ? "under" : (totalSaved < 0 ? "over" : "");
    const totalLabel = totalSaved > 0
      ? ` (-${formatElapsed(totalSaved)})`
      : (totalSaved < 0 ? ` (+${formatElapsed(-totalSaved)})` : "");

    const c = teamColor();
    const el = document.createElement("div");
    el.className = "summary-screen";
    el.innerHTML = `
      <h1 style="color:${c}; text-shadow: 0 0 30px ${c};">${state.team} · Done</h1>
      <ul class="summary-list">
        ${rows}
        <li class="summary-row total-row">
          <span class="name">Total</span>
          <span class="time ${totalCls}">${formatElapsed(total)}${totalLabel}</span>
        </li>
      </ul>
      <div class="btn-row">
        <button id="leaderboardBtn">🏆 Leaderboard</button>
        <button class="btn-done" id="againBtn">Run Again</button>
      </div>
    `;
    app.appendChild(el);
    document.getElementById("againBtn").addEventListener("click", () => {
      state.screen = "splash";
      state.team = null;
      state.members = [];
      state.colors = {};
      state.results = [];
      render();
    });
    document.getElementById("leaderboardBtn").addEventListener("click", () => {
      state.screen = "leaderboard";
      render();
    });
  }

  // ---------- Leaderboard ----------
  function renderLeaderboard() {
    const data = loadLeaderboard();
    const entries = Object.entries(data)
      .map(([name, stats]) => ({ name, ...stats }))
      .sort((a, b) => b.saved - a.saved);

    const rankIcon = i => i === 0 ? "🚀" : i === 1 ? "🥈" : i === 2 ? "🥉" : `#${i + 1}`;

    let body;
    if (entries.length === 0) {
      body = `<div class="empty-leaderboard">No data yet — run a standup to start tracking</div>`;
    } else {
      const rows = entries.map((e, i) => {
        const cls = i === 0 ? "top1" : i === 1 ? "top2" : i === 2 ? "top3" : "";
        const savedCls = e.saved > 0 ? "under" : (e.saved < 0 ? "over" : "");
        const sign = e.saved > 0 ? "-" : (e.saved < 0 ? "+" : "");
        const savedStr = `${sign}${formatElapsed(Math.abs(e.saved))}`;
        return `
          <li class="leaderboard-row ${cls}">
            <span class="rank">${rankIcon(i)}</span>
            <span class="name">${e.name}</span>
            <span class="runs">${e.runs} ${e.runs === 1 ? "run" : "runs"}</span>
            <span class="saved ${savedCls}">${savedStr}</span>
          </li>
        `;
      }).join("");
      body = `<ul class="leaderboard-list">${rows}</ul>`;
    }

    const el = document.createElement("div");
    el.className = "leaderboard-screen";
    el.innerHTML = `
      <h1>🏆 Leaderboard</h1>
      <p class="subtitle">Total time saved across all rounds · this device only</p>
      ${body}
      <div class="btn-row">
        <button class="btn-back" id="backBtn">Back</button>
        ${entries.length ? `<button class="btn-over" id="resetBtn">Reset</button>` : ""}
      </div>
    `;
    app.appendChild(el);

    document.getElementById("backBtn").addEventListener("click", () => {
      state.screen = "splash";
      render();
    });
    const resetBtn = document.getElementById("resetBtn");
    if (resetBtn) {
      resetBtn.addEventListener("click", () => {
        if (confirm("Clear the leaderboard? This cannot be undone.")) {
          clearLeaderboard();
          render();
        }
      });
    }
  }

  render();
})();
</script>
</body>
</html>
